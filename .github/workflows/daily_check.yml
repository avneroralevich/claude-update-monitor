name: Daily Claude Update Check

on:
  schedule:
    - cron: '0 7 * * *'   # daily full check at 07:00 UTC (10:00 Israel)
    - cron: '0 */2 * * *' # every 2 hours — process commands (/summary etc.)
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
        run: python checker.py

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen.json subscribers.json
          git diff --cached --quiet || git commit -m "chore: update state [skip ci]"
          git push
