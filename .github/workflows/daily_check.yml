name: Daily Claude Update Check

on:
  schedule:
    - cron: '0 7 * * *'   # every day at 07:00 UTC (10:00 Israel time)
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
        run: python checker.py

      - name: Commit updated last_seen.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_seen.json
          git diff --cached --quiet || git commit -m "chore: update last_seen [skip ci]"
          git push
